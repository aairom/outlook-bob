name: Build Desktop Installers

on:
  push:
    branches:
      - main
    paths:
      # Only rebuild when the Electron app source actually changes
      - "electron-outlook/src/**"
      - "electron-outlook/package.json"
      - "electron-outlook/package-lock.json"
      - "electron-outlook/tsconfig.json"
      - ".github/workflows/build-mac.yml"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build & Package (macOS arm64)
    runs-on: macos-latest

    defaults:
      run:
        working-directory: electron-outlook

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron-outlook/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and package macOS app
        run: npm run pack:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Outlook-Folder-Extractor-macOS-arm64
          path: electron-outlook/dist/*.dmg
          retention-days: 30

  build-win:
    name: Build & Package (Windows)
    runs-on: windows-latest

    defaults:
      run:
        working-directory: electron-outlook

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron-outlook/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and package Windows app
        run: npm run pack:win

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Outlook-Folder-Extractor-Windows
          path: |
            electron-outlook/dist/*.exe
            electron-outlook/dist/*.nsis.7z
            electron-outlook/dist/latest*.yml
          retention-days: 30

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-win

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Outlook-Folder-Extractor-macOS-arm64
          path: release-assets/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Outlook-Folder-Extractor-Windows
          path: release-assets/win

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "Auto-build — ${{ steps.sha.outputs.short }}"
          body: |
            Automated desktop installer build from commit `${{ github.sha }}`.

            **Branch:** `${{ github.ref_name }}`
            **Triggered by:** ${{ github.actor }}
            **Artifacts:** macOS `.dmg`, Windows `.exe`
          files: |
            release-assets/mac/*
            release-assets/win/*
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
