name: Build macOS App

on:
  push:
    branches:
      - main
    paths:
      # Only rebuild when the Electron app source actually changes
      - "electron-outlook/src/**"
      - "electron-outlook/package.json"
      - "electron-outlook/package-lock.json"
      - "electron-outlook/tsconfig.json"
      - ".github/workflows/build-mac.yml"

jobs:
  build:
    name: Build & Package (macOS arm64)
    runs-on: macos-latest

    defaults:
      run:
        working-directory: electron-outlook

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron-outlook/package-lock.json

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build & Package ────────────────────────────────────────────────────
      - name: Build and package macOS app
        run: npm run pack:mac
        env:
          # Disable code signing — no Developer ID cert available in CI
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # ── 5. Upload DMG as workflow artifact ────────────────────────────────────
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Outlook-Folder-Extractor-macOS-arm64
          path: electron-outlook/dist/*.dmg
          retention-days: 30

      # ── 6. Create a GitHub Release on every main push ─────────────────────────
      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
        working-directory: ${{ github.workspace }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "Auto-build — ${{ steps.sha.outputs.short }}"
          body: |
            Automated build from commit `${{ github.sha }}`.

            **Branch:** `${{ github.ref_name }}`
            **Triggered by:** ${{ github.actor }}
          files: electron-outlook/dist/*.dmg
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
